questions:
  - code: dsq_001
    text: 今天你最想守护的情绪是什么？
    options:
      - 平静
      - 勇气
      - 热情
      - 自由
    insights:
      "0": 你在寻找一种不被打扰的内在秩序，今天适合给自己留一点空白。
      "1": 你想把自己重新往前推一步，哪怕只是一个很小的决定也有意义。
      "2": 你的情绪能量正在往外扩张，适合做一点表达型的事。
      "3": 你需要从外界期待里抽身，重新确认什么是你真正想要的。
  - code: dsq_002
    text: 如果今天只能给自己一句提醒，你会选哪句？
    options:
      - 慢一点也没关系
      - 先做最重要的事
      - 去表达真实感受
      - 给自己一点奖励
    insights:
      "0": 你的身心可能都在提醒你放慢节奏，今天不需要对自己太苛刻。
      "1": 你很清楚当下最重要的事情，聚焦会让你更有掌控感。
      "2": 你此刻更需要真实连接，而不是继续把感受压在心里。
      "3": 你正在努力很久了，允许自己得到一点温柔的反馈。
  - code: dsq_003
    text: 此刻最像你心情颜色的是哪一种？
    options:
      - 暖紫
      - 珊瑚粉
      - 薄荷绿
      - 琥珀金
    insights:
      "0": 你有一种安静但深刻的情绪流动，适合独处和整理思绪。
      "1": 你正在靠近柔软和连接，适合去回应喜欢的人和事。
      "2": 你需要的是清新和修复，今天适合散步、呼吸和减压。
      "3": 你带着一点发光感，适合推进计划和完成重要的小目标。
