by_interaction_type:
  default:
    - 继续往下看看，你的灵魂画像正在慢慢成形。
    - 很好，这一题的信息已经收到了。
  swipe:
    left:
      - 这一下很果断，边界感很清晰。
      - 收到，是一个偏克制的选择。
    right:
      - 这个方向有点坚定，我记住了。
      - 嗯，这像是你很自然的倾向。
  slider:
    low:
      - 这个分值偏低，说明你在这件事上更谨慎。
      - 稍微保留一点，也很真实。
    mid:
      - 落在中间区域，说明你会看情境再决定。
      - 这种平衡感很有意思。
    high:
      - 这个强度不低，感受已经很明确了。
      - 看起来你在这里很有共鸣。
  bubble:
    default:
      - 这个气泡选得很像你。
      - 这个答案带着一点你自己的节奏。
  scenario:
    default:
      - 情景题最能看出你的本能反应。
  tarot:
    default:
      - 命运卡面已经翻开一点了。
  scratch:
    default:
      - 隐藏的答案露出来了，继续。
