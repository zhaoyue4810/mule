.about-copyright{text-align:center;padding:24px 0;font-size:10px;color:var(--txt3)}

/* === NOTIFICATIONS === */
.notif-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;position:sticky;top:0;z-index:50;background:rgba(251,247,244,0.92);backdrop-filter:blur(14px)}
.notif-title{font-size:17px;font-weight:800}
.notif-mark-read{font-size:11px;color:var(--purple);font-weight:600}
.notif-list{padding:0 20px}
.notif-item{display:flex;gap:12px;padding:16px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;transition:transform .2s;position:relative}
.notif-item.unread{background:linear-gradient(135deg,rgba(237,229,249,0.4),rgba(253,230,239,0.3));border-color:rgba(155,126,216,0.15)}
.notif-item.unread::before{content:'';position:absolute;top:18px;left:8px;width:6px;height:6px;border-radius:50%;background:var(--pink)}
.notif-item:active{transform:scale(.98)}
.notif-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.notif-body{flex:1;min-width:0}
.notif-item-title{font-size:13px;font-weight:600;margin-bottom:2px}
.notif-item-desc{font-size:11px;color:var(--txt2);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.notif-time{font-size:10px;color:var(--txt3);margin-top:4px}
.notif-empty{text-align:center;padding:60px 0;color:var(--txt3);font-size:13px}
.notif-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:8px;background:var(--pink);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg)}
.home-notif-wrap{position:relative}

/* === STORY CARDS === */
.story-card{margin:0 20px 14px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-sm)}
.story-card-top{padding:14px 16px 0;display:flex;align-items:center;gap:10px}
.story-card-ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.story-card-meta{flex:1}
.story-card-name{font-size:13px;font-weight:600}
.story-card-type{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;background:var(--purple-p);color:var(--purple);margin-left:6px}
.story-card-time{font-size:10px;color:var(--txt3)}
.story-card-body{padding:12px 16px}
.story-card-title{font-family:var(--serif);font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.4}
.story-card-content{font-size:12px;color:var(--txt2);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.story-card-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--bdr2)}
.story-card-likes{font-size:12px;color:var(--txt3);display:flex;align-items:center;gap:4px}
.story-card-read{font-size:11px;color:var(--purple);font-weight:600}

/* === ZODIAC DETAIL === */
.zodiac-detail{padding:0 20px}
.zodiac-detail-header{text-align:center;padding:28px 0 20px;position:relative}
.zodiac-detail-emoji{font-size:56px;margin-bottom:6px}
.zodiac-detail-name{font-family:var(--serif);font-size:22px;font-weight:900;margin-bottom:4px}
.zodiac-detail-date{font-size:11px;color:var(--txt3)}
.zodiac-luck-score{margin:16px 0;padding:20px;background:linear-gradient(135deg,var(--purple-p),var(--pink-p));border-radius:var(--r-lg);text-align:center}
.zodiac-luck-num{font-size:48px;font-weight:900;background:linear-gradient(135deg,var(--purple-d),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.zodiac-luck-label{font-size:12px;color:var(--txt2);margin-top:2px}
.zodiac-fortune-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.zodiac-fortune-item{padding:14px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);text-align:center}
.zodiac-fortune-item-icon{font-size:22px;margin-bottom:4px}
.zodiac-fortune-item-name{font-size:11px;color:var(--txt2);margin-bottom:6px}
.zodiac-fortune-bar{height:4px;border-radius:2px;background:var(--bg2);overflow:hidden}
.zodiac-fortune-bar-fill{height:100%;border-radius:2px;transition:width .8s var(--ease)}
.zodiac-fortune-score{font-size:12px;font-weight:700;margin-top:4px}
.zodiac-lucky{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.zodiac-lucky-item{flex:1;min-width:80px;padding:12px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);text-align:center}
.zodiac-lucky-label{font-size:10px;color:var(--txt3);margin-bottom:4px}
.zodiac-lucky-val{font-size:13px;font-weight:700;color:var(--purple)}
.zodiac-advice{padding:16px;background:linear-gradient(135deg,var(--purple-p),var(--peach-p));border-radius:var(--r);margin:16px 0 20px}
.zodiac-advice-title{font-size:12px;font-weight:700;color:var(--purple-d);margin-bottom:6px}
.zodiac-advice-text{font-size:12px;color:var(--txt2);line-height:1.7}

/* === ACHIEVEMENTS === */
.achievement-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0}
.achievement-item{text-align:center;padding:14px 8px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);position:relative;transition:transform .2s}
.achievement-item.locked{opacity:.5;filter:grayscale(.4)}
.achievement-item.unlocked{border-color:var(--purple-l);box-shadow:var(--sh-sm)}
.achievement-item:active{transform:scale(.95)}
.achievement-icon{font-size:28px;margin-bottom:6px}
.achievement-name{font-size:10px;font-weight:600;color:var(--txt);line-height:1.3}
.achievement-item.locked .achievement-icon{filter:grayscale(1);opacity:.4}
.achievement-lock-badge{position:absolute;top:4px;right:4px;font-size:10px}

/* === BOTTOM SHEET === */
.bottom-sheet-overlay{position:fixed;inset:0;background:rgba(60,40,80,0.4);backdrop-filter:blur(8px);z-index:9000;opacity:0;transition:opacity .3s var(--ease);pointer-events:none}
.bottom-sheet-overlay.show{opacity:1;pointer-events:auto}
.bottom-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;max-height:80vh;background:var(--card-solid);border-radius:var(--r-xl) var(--r-xl) 0 0;box-shadow:0 -8px 40px rgba(0,0,0,0.12);z-index:9001;transition:transform .4s var(--ease);overflow:hidden}
.bottom-sheet.show{transform:translateX(-50%) translateY(0)}
.bottom-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--bdr);margin:10px auto 0}
.bottom-sheet-header{padding:14px 20px 0;font-size:16px;font-weight:700;text-align:center}
.bottom-sheet-body{padding:16px 20px 32px;overflow-y:auto;max-height:calc(80vh - 60px)}

/* === GRAIN OVERLAY === */
#app::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.018;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* === PAGE TRANSITIONS === */
.page-exit{animation:pageOut .3s var(--ease) forwards}
@keyframes pageOut{to{opacity:0;transform:translateY(-10px)}}

/* === SCRATCH CARD === */
.scratch-zone{display:flex;flex-direction:column;align-items:center;gap:14px;padding:10px 0;min-height:280px;justify-content:center}
.scratch-card{position:relative;width:260px;height:180px;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-lg)}
.scratch-canvas{position:absolute;inset:0;z-index:2;cursor:crosshair;touch-action:none;border-radius:var(--r-lg)}
.scratch-reveal{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:linear-gradient(160deg,var(--purple-p),var(--pink-p));border-radius:var(--r-lg)}
.scratch-reveal-emoji{font-size:48px}
.scratch-reveal-text{font-size:14px;font-weight:700;color:var(--txt);text-align:center;padding:0 16px}
.scratch-hint{font-size:12px;color:var(--txt3);animation:pulse 2s ease-in-out infinite}
.scratch-progress{font-size:11px;color:var(--purple);font-weight:600}

/* === DRAG RANK === */
.rank-zone{padding:0 10px;min-height:280px}
.rank-hint{text-align:center;font-size:12px;color:var(--txt3);margin-bottom:12px}
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);touch-action:none;transition:transform .2s,box-shadow .2s,border-color .2s;user-select:none}
.rank-item.dragging{z-index:10;box-shadow:var(--sh-lg);border-color:var(--purple-l);transform:scale(1.03);opacity:.9}
.rank-item.drop-target{border-color:var(--pink-l);border-style:dashed}
.rank-num{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--purple-l),var(--pink-l));color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank-emoji{font-size:22px;flex-shrink:0}
.rank-text{font-size:13px;font-weight:600;flex:1}
.rank-handle{font-size:16px;color:var(--txt3);flex-shrink:0}
.rank-confirm{margin-top:16px;text-align:center}
.rank-confirm button{padding:12px 36px;border-radius:24px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(155,126,216,0.3);transition:transform .2s var(--spring)}
.rank-confirm button:active{transform:scale(.95)}

/* === PRESSURE HOLD === */
.pressure-zone{display:flex;flex-direction:column;align-items:center;gap:16px;padding:10px 0;min-height:300px;justify-content:center}
.pressure-circle{width:160px;height:160px;border-radius:50%;border:4px solid var(--bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;-webkit-tap-highlight-color:transparent;transition:border-color .15s,box-shadow .15s;touch-action:none;position:relative;overflow:hidden;user-select:none}
.pressure-circle::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--purple) var(--pct,0%),transparent var(--pct,0%));opacity:.15;transition:none}
.pressure-circle.pressing{transform:scale(1.08);border-color:var(--purple);box-shadow:0 0 32px rgba(155,126,216,0.35)}
.pressure-circle.pressing::before{opacity:.3}
.pressure-emoji{font-size:48px;transition:transform .3s var(--spring);position:relative;z-index:1}
.pressure-circle.pressing .pressure-emoji{transform:scale(1.2)}
.pressure-label{font-size:14px;font-weight:700;color:var(--purple);position:relative;z-index:1;min-height:22px}
.pressure-meter{width:200px;height:8px;border-radius:4px;background:var(--bg2);overflow:hidden}
.pressure-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--purple-l),var(--pink),var(--peach));width:0%;transition:width .05s}
.pressure-hint{font-size:12px;color:var(--txt3);text-align:center;animation:pulse 2s ease-in-out infinite}

/* === 2D PLOT === */
.plot-zone{display:flex;flex-direction:column;align-items:center;gap:12px;padding:10px 0;min-height:320px}
.plot-grid{position:relative;width:260px;height:260px;background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);touch-action:none;cursor:crosshair;overflow:hidden}
.plot-axis-x{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--bdr)}
.plot-axis-y{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--bdr)}
.plot-label{position:absolute;font-size:10px;font-weight:600;color:var(--txt3);white-space:nowrap}
.plot-label.top{top:6px;left:50%;transform:translateX(-50%)}
.plot-label.bottom{bottom:6px;left:50%;transform:translateX(-50%)}
.plot-label.left{left:6px;top:50%;transform:translateY(-50%)}
.plot-label.right{right:6px;top:50%;transform:translateY(-50%)}
.plot-dot{position:absolute;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:0 0 16px rgba(155,126,216,0.4);transform:translate(-50%,-50%);display:none;align-items:center;justify-content:center;font-size:12px;pointer-events:none;z-index:2}
.plot-dot.visible{display:flex}
.plot-coords{font-size:11px;color:var(--txt2);font-weight:500;min-height:18px}
.plot-confirm{padding:12px 36px;border-radius:24px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(155,126,216,0.3);transition:transform .2s var(--spring);opacity:.4;pointer-events:none}
.plot-confirm.active{opacity:1;pointer-events:auto}
.plot-confirm:active{transform:scale(.95)}

/* === COLOR PICKER === */
.cpick-zone{display:flex;flex-direction:column;align-items:center;gap:16px;padding:10px 0;min-height:300px;justify-content:center}
.cpick-wheel{width:200px;height:200px;border-radius:50%;background:conic-gradient(#ff6b6b,#feca57,#48dbfb,#ff9ff3,#54a0ff,#5f27cd,#ff6b6b);box-shadow:var(--sh-lg),inset 0 0 30px rgba(0,0,0,0.05);cursor:pointer;touch-action:none;position:relative}
.cpick-wheel::before{content:'';position:absolute;inset:30%;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.9) 0%,transparent 100%);pointer-events:none}
.cpick-selected{width:48px;height:48px;border-radius:50%;border:3px solid #fff;box-shadow:var(--sh-md);transition:background .3s}
.cpick-label{font-size:14px;font-weight:700;color:var(--txt);min-height:22px;text-align:center;transition:color .3s}
.cpick-sublabel{font-size:11px;color:var(--txt2)}
.cpick-pointer{position:absolute;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.2);transform:translate(-50%,-50%);pointer-events:none;z-index:2;display:none}
.cpick-pointer.visible{display:block}
.cpick-confirm{padding:12px 36px;border-radius:24px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(155,126,216,0.3);transition:transform .2s var(--spring);opacity:.4;pointer-events:none}
.cpick-confirm.active{opacity:1;pointer-events:auto}
.cpick-confirm:active{transform:scale(.95)}

/* === FORTUNE CALENDAR === */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;position:sticky;top:0;z-index:50;background:rgba(251,247,244,0.92);backdrop-filter:blur(14px)}
.cal-title{font-size:15px;font-weight:700}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-nav-btn{width:28px;height:28px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--txt2);transition:transform .2s}
.cal-nav-btn:active{transform:scale(.9)}
.cal-month{font-size:14px;font-weight:700;min-width:100px;text-align:center}
.cal-view-toggle{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:3px}
.cal-view-btn{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;color:var(--txt2);transition:all .3s}
.cal-view-btn.active{background:var(--card-solid);color:var(--txt);box-shadow:var(--sh-sm)}
.cal-stats{display:flex;gap:10px;padding:0 20px;margin-bottom:16px}
.cal-stat{flex:1;padding:14px 10px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);text-align:center}
.cal-stat-v{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cal-stat-l{font-size:10px;color:var(--txt3);margin-top:2px}
.cal-grid-wrap{padding:0 20px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-weekday{text-align:center;font-size:10px;color:var(--txt3);font-weight:600;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--txt3);transition:all .2s;cursor:pointer;position:relative}
.cal-cell:active{transform:scale(.88)}
.cal-cell.today{border:1.5px solid var(--purple);font-weight:700;color:var(--purple)}
.cal-cell.has-data{font-weight:600;color:var(--txt)}
.cal-cell.empty{opacity:0;pointer-events:none}
.cal-cell.future{opacity:.3;pointer-events:none}
.cal-year-wrap{padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-year-grid{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:2px;width:max-content;padding:4px 0}
.cal-year-cell{width:11px;height:11px;border-radius:2px;transition:background .2s}
.cal-legend{display:flex;align-items:center;gap:4px;padding:12px 20px;font-size:10px;color:var(--txt3);justify-content:flex-end}
.cal-legend-cell{width:11px;height:11px;border-radius:2px}
.cal-mood-popup{padding:0 20px;margin:16px 0}
.cal-mood-card{padding:16px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);text-align:center}
.cal-mood-card-title{font-size:13px;font-weight:600;margin-bottom:12px}
.mood-input{display:flex;gap:12px;justify-content:center;padding:8px 0}
.mood-btn{font-size:28px;padding:8px;border-radius:12px;transition:all .2s var(--spring)}
.mood-btn:active{transform:scale(1.2)}
.mood-btn.selected{background:var(--purple-p);transform:scale(1.15);box-shadow:var(--sh-sm)}

/* === BADGE TIERS === */
.achievement-item.tier-gold{border-color:var(--gold);box-shadow:0 0 12px rgba(212,168,83,0.2)}
.achievement-item.tier-diamond{border-color:var(--purple);box-shadow:0 0 16px rgba(155,126,216,0.3)}
.achievement-item.new-badge::after{content:'NEW';position:absolute;top:2px;left:2px;padding:1px 6px;border-radius:6px;font-size:8px;font-weight:700;background:var(--pink);color:#fff}
.badge-detail-icon{font-size:48px;text-align:center;margin-bottom:12px}
.badge-detail-name{font-family:var(--serif);font-size:20px;font-weight:800;text-align:center;margin-bottom:4px}
.badge-detail-desc{font-size:12px;color:var(--txt2);text-align:center;line-height:1.7;margin-bottom:16px}
.badge-celebration{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(60,40,80,0.5);backdrop-filter:blur(12px);animation:fadeIn .4s var(--ease)}
.badge-celebration-card{text-align:center;padding:36px;background:var(--card-solid);border-radius:var(--r-xl);box-shadow:var(--sh-lg);max-width:280px;animation:popIn .5s var(--spring)}
.badge-celebration-icon{font-size:56px;margin-bottom:8px}
.badge-celebration-title{font-family:var(--serif);font-size:18px;font-weight:800;margin-bottom:4px}
.badge-celebration-desc{font-size:12px;color:var(--txt2);line-height:1.6;margin-bottom:16px}
.badge-celebration-btn{padding:10px 32px;border-radius:20px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:13px;font-weight:700}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}

/* === DUO BADGES === */
.duo-badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.duo-badge{text-align:center;padding:14px 8px;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);position:relative;transition:transform .2s}
.duo-badge.unlocked{border-color:var(--pink-l);box-shadow:0 0 12px rgba(232,114,154,0.15);background:linear-gradient(160deg,rgba(253,230,239,0.4),var(--card))}
.duo-badge.locked{opacity:.5;filter:grayscale(.4)}
.duo-badge:active{transform:scale(.95)}
.duo-badge-icon{font-size:28px;margin-bottom:6px}
.duo-badge-name{font-size:10px;font-weight:600;line-height:1.3}
.duo-badge.locked .duo-badge-icon{filter:grayscale(1);opacity:.4}
.duo-badge-lock{position:absolute;top:4px;right:4px;font-size:10px}
.mr-duo-badges{display:flex;gap:10px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none}
.mr-duo-badges::-webkit-scrollbar{display:none}

// ===== F5: 小测 MEMORY SYSTEM =====
function getXcMemory(){try{return JSON.parse(localStorage.getItem('xc_memory')||'{}');}catch(e){return {};}}
function saveXcMemory(m){try{localStorage.setItem('xc_memory',JSON.stringify(m));}catch(e){}}
function updateXcMemory(){
const m=getXcMemory();const h=A.hist;if(!h.length)return m;
const hours=h.map(r=>new Date(r.date).getHours());
m.isNightOwl=hours.filter(h=>h>=0&&h<5).length>h.length*0.4;
m.isEarlyBird=hours.filter(h=>h>=6&&h<10).length>h.length*0.3;
const catCount={};h.forEach(r=>{if(r.test)catCount[r.test.cat]=(catCount[r.test.cat]||0)+1;});
m.favCat=Object.entries(catCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
const durations=h.filter(r=>r.duration).map(r=>r.duration);
m.avgSpeed=durations.length?Math.round(durations.reduce((a,b)=>a+b,0)/durations.length):null;
m.isFast=m.avgSpeed&&m.avgSpeed<180;m.isSlow=m.avgSpeed&&m.avgSpeed>400;
const scores=h.map(r=>r.overall).filter(Boolean);
m.avgScore=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
m.highScorer=m.avgScore>82;m.testCount=h.length;
m.knowLevel=Math.min(100,Math.round(h.length*12+Object.keys(catCount).length*8));
saveXcMemory(m);return m;
}
function xcMemoryGreeting(){
const m=getXcMemory();if(!m.testCount||m.testCount<1)return null;
let pool=XC_MEM_COMMENTS.returnUser;const hr=new Date().getHours();
if(m.isNightOwl&&hr>=22)pool=XC_MEM_COMMENTS.nightOwl;
else if(m.isEarlyBird&&hr<10)pool=XC_MEM_COMMENTS.earlyBird;
else if(m.favCat==='性格测试')pool=XC_MEM_COMMENTS.personalityFan;
else if(m.favCat==='关系匹配')pool=XC_MEM_COMMENTS.relationFan;
else if(m.isFast)pool=XC_MEM_COMMENTS.speedster;
else if(m.isSlow)pool=XC_MEM_COMMENTS.thinker;
else if(m.highScorer)pool=XC_MEM_COMMENTS.highScorer;
return pool[Math.floor(Math.random()*pool.length)];
}
function xcSuggestTest(){
const m=getXcMemory();if(!m.testCount||m.testCount<3)return null;
const doneIds=new Set(A.hist.map(r=>r.test?.id));let suggest=null;
if(m.favCat)suggest=T.find(t=>t.cat===m.favCat&&!doneIds.has(t.id));
if(!suggest){const doneCats=new Set(A.hist.map(r=>r.test?.cat));suggest=T.find(t=>!doneCats.has(t.cat)&&!doneIds.has(t.id));}
if(!suggest)suggest=T.find(t=>!doneIds.has(t.id));
return suggest;
}
function renderXcMemoryHome(){
const m=updateXcMemory();if(!m.testCount||m.testCount<1)return '';
const greeting=xcMemoryGreeting();const suggest=xcSuggestTest();
let html=`<div class="xc-mem anim-fu d2">
<div>${xcFace('happy')}</div>
<div style="flex:1;min-width:0">
<div style="font-size:12px;font-weight:600;margin-bottom:2px">${greeting||'我在慢慢了解你呢~'}</div>
<div style="font-size:10px;color:var(--txt3)">小测对你的了解度：${m.knowLevel||0}%</div>
<div class="xc-mem-bar"><div class="xc-mem-fill" style="width:0%" data-mw="${m.knowLevel||0}%"></div></div>
</div></div>`;
if(suggest){const si=T.indexOf(suggest);
html+=`<div style="margin:0 16px 8px;padding:12px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--card);display:flex;align-items:center;gap:10px;cursor:pointer" class="anim-fu d3" onclick="nav('test-detail',T[${si}])">

<div style="font-size:11px;color:var(--purple);font-weight:600">去测试 ›</div></div>`;}

}

// ===== F3: SHARE CARD GENERATOR =====
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function drawMiniRadar(ctx,cx,cy,radius,dims,scores){
const n=Math.min(dims.length,5);const step=Math.PI*2/n;
ctx.strokeStyle='rgba(155,126,216,0.15)';ctx.lineWidth=1;
[0.33,0.66,1].forEach(s=>{ctx.beginPath();for(let i=0;i<=n;i++){const a=-Math.PI/2+i*step;const x=cx+Math.cos(a)*radius*s;const y=cy+Math.sin(a)*radius*s;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();});
ctx.fillStyle='rgba(155,126,216,0.2)';ctx.strokeStyle='#9B7ED8';ctx.lineWidth=2;ctx.beginPath();
scores.slice(0,n).forEach((s,i)=>{const a=-Math.PI/2+i*step;const r2=radius*s/100;const x=cx+Math.cos(a)*r2;const y=cy+Math.sin(a)*r2;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
ctx.closePath();ctx.fill();ctx.stroke();
ctx.fillStyle='#7B6E85';ctx.font='11px sans-serif';ctx.textAlign='center';
dims.slice(0,n).forEach((d,i)=>{const a=-Math.PI/2+i*step;ctx.fillText(d,cx+Math.cos(a)*(radius+18),cy+Math.sin(a)*(radius+18)+4);});
}
function drawDecoQR(ctx,x,y,size){
const s=size/8;ctx.fillStyle='rgba(155,126,216,0.12)';
for(let r=0;r<8;r++)for(let c=0;c<8;c++){if(Math.random()>0.4)ctx.fillRect(x+c*s,y+r*s,s-1,s-1);}
ctx.fillStyle='rgba(155,126,216,0.25)';
[[0,0],[5,0],[0,5]].forEach(([cr,cc])=>{ctx.fillRect(x+cr*s,y+cc*s,s*3,s*3);ctx.clearRect(x+cr*s+s*0.5,y+cc*s+s*0.5,s*2,s*2);ctx.fillRect(x+cr*s+s,y+cc*s+s,s,s);});
}
function wrapText(ctx,text,x,y,maxW,lineH){let line='';let curY=y;
for(const ch of text){const test=line+ch;if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,x,curY);line=ch;curY+=lineH;}else{line=test;}}
ctx.fillText(line,x,curY);
}
function generateShareCard(r,mode){
const canvas=document.createElement('canvas');canvas.width=640;canvas.height=900;
const ctx=canvas.getContext('2d');
const grad=ctx.createLinearGradient(0,0,640,900);
grad.addColorStop(0,'#7C5DBF');grad.addColorStop(0.4,'#B57FE0');grad.addColorStop(0.7,'#E8729A');grad.addColorStop(1,'#F2A68B');
ctx.fillStyle=grad;ctx.fillRect(0,0,640,900);
ctx.fillStyle='rgba(255,255,255,0.95)';roundRect(ctx,40,40,560,780,24);ctx.fill();
ctx.font='64px serif';ctx.textAlign='center';ctx.fillText(r.pIcon||'🧠',320,140);
ctx.fillStyle='#3A2E42';ctx.font='bold 28px sans-serif';ctx.fillText('「'+(r.persona||'灵魂探索者')+'」',320,190);
ctx.fillStyle='#9B7ED8';ctx.font='bold 18px sans-serif';
ctx.fillText('综合得分 '+(r.overall||0)+'分 · 稀有度 '+(r.rarity||'3.0')+'%',320,222);
if(r.dims&&r.scores)drawMiniRadar(ctx,320,365,95,r.dims,r.scores);
ctx.fillStyle='#7B6E85';ctx.font='13px sans-serif';ctx.textAlign='center';
(r.dims||[]).slice(0,5).forEach((d,i)=>{ctx.fillText(d+': '+(r.scores?.[i]||0)+'分',320,485+i*22);});
const kws=SOUL_KWS?.[r.persona]||['独特','真实','有趣'];
ctx.fillStyle='#9B7ED8';ctx.font='bold 14px sans-serif';ctx.fillText(kws.join(' · '),320,615);
const sig=SOUL_SIGS?.[r.persona]||'每一个灵魂，都值得被认真对待';
ctx.fillStyle='#B5A9BF';ctx.font='italic 13px sans-serif';wrapText(ctx,'"'+sig+'"',320,655,480,20);
if(mode==='challenge'){ctx.fillStyle='#E8729A';ctx.font='bold 22px sans-serif';ctx.fillText('🔥 来挑战我的分数！',320,735);}
ctx.fillStyle='#B5A9BF';ctx.font='11px sans-serif';ctx.fillText('心测 · 你的灵魂说明书',320,785);
drawDecoQR(ctx,520,700,80);
ctx.fillStyle='rgba(155,126,216,0.12)';ctx.beginPath();ctx.moveTo(0,860);ctx.bezierCurveTo(160,830,480,890,640,850);ctx.lineTo(640,900);ctx.lineTo(0,900);ctx.fill();
return canvas;
}
function showShareCard(r,mode){
const canvas=generateShareCard(r,mode||'report');
const overlay=document.createElement('div');overlay.className='share-card-overlay';
const wrap=document.createElement('div');wrap.className='share-card-wrap';
const img=document.createElement('img');img.src=canvas.toDataURL('image/png');img.className='share-card-canvas';
wrap.appendChild(img);
wrap.innerHTML+=`<div class="share-card-actions">
<button class="share-card-btn" onclick="saveShareImage()">保存图片 📥</button>
<button class="share-card-close" onclick="this.closest('.share-card-overlay').remove()">关闭</button></div>`;
overlay.appendChild(wrap);
overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
document.body.appendChild(overlay);window._shareCanvas=canvas;
}
function saveShareImage(){
if(!window._shareCanvas)return;
const link=document.createElement('a');link.download='心测-灵魂分享卡.png';
link.href=window._shareCanvas.toDataURL('image/png');link.click();toast('图片已保存 🎉');

function renderCalMonth(container){
const cal=getCalendarData();
const y=A.calYear,m=A.calMonth;
const firstDay=new Date(y,m,1).getDay();
const daysInMonth=new Date(y,m+1,0).getDate();
const today=new Date();const todayStr=today.toISOString().slice(0,10);
const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const streak=getStreak();
const monthKeys=Object.keys(cal).filter(k=>k.startsWith(`${y}-${String(m+1).padStart(2,'0')}`));
const activeDays=monthKeys.length;
const avgMood=monthKeys.length?Math.round(monthKeys.reduce((a,k)=>{const v=cal[k];return a+(v.fortune||v.mood*20||0);},0)/monthKeys.length):0;

container.innerHTML=`<div class="cal-stats">
<div class="cal-stat"><div class="cal-stat-v">🔥 ${streak}</div><div class="cal-stat-l">连续天数</div></div>
<div class="cal-stat"><div class="cal-stat-v">${activeDays}</div><div class="cal-stat-l">本月活跃</div></div>
<div class="cal-stat"><div class="cal-stat-v">${avgMood||'—'}</div><div class="cal-stat-l">平均运势</div></div></div>
<div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:12px">
<div class="cal-nav-btn" onclick="A.calMonth--;if(A.calMonth<0){A.calMonth=11;A.calYear--;}renderCalendar(document.getElementById('page-container'))">‹</div>
<div class="cal-month">${y}年${monthNames[m]}</div>
<div class="cal-nav-btn" onclick="A.calMonth++;if(A.calMonth>11){A.calMonth=0;A.calYear++;}renderCalendar(document.getElementById('page-container'))">›</div></div>
<div class="cal-grid-wrap">
<div class="cal-weekdays">${['日','一','二','三','四','五','六'].map(d=>`<div class="cal-weekday">${d}</div>`).join('')}</div>
<div class="cal-grid" id="cal-month-grid"></div></div>
<div class="cal-mood-popup"><div class="cal-mood-card">
<div class="cal-mood-card-title">今天心情怎么样？</div>
<div class="mood-input">${MOOD_EMOJIS.slice(1).map((e,i)=>`<div class="mood-btn" data-mood="${i+1}" onclick="logMood(${i+1},this)">${e}</div>`).join('')}</div>
</div></div>`;

const grid=document.getElementById('cal-month-grid');
let cells='';
for(let i=0;i<firstDay;i++)cells+=`<div class="cal-cell empty"></div>`;
for(let d=1;d<=daysInMonth;d++){
const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const entry=cal[dateStr];
const isToday=dateStr===todayStr;
const isFuture=new Date(y,m,d)>today;
let bg=CALENDAR_COLORS[0];
if(entry){
const score=entry.fortune||(entry.mood?entry.mood*20:0);
const level=Math.min(5,Math.max(1,Math.ceil(score/20)));
bg=CALENDAR_COLORS[level];
}
const cls=`cal-cell${isToday?' today':''}${entry?' has-data':''}${isFuture?' future':''}`;
const emoji=entry&&entry.mood?MOOD_EMOJIS[entry.mood]:'';
cells+=`<div class="${cls}" style="background:${bg}" onclick="showDayDetail('${dateStr}')">${emoji||d}</div>`;
}
grid.innerHTML=cells;
}

function renderCalYear(container){
const cal=getCalendarData();
const y=A.calYear;
const today=new Date();
container.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 20px;margin-bottom:8px">
<div class="cal-nav-btn" onclick="A.calYear--;renderCalendar(document.getElementById('page-container'))">‹</div>
<div style="font-size:16px;font-weight:700">${y}年</div>
<div class="cal-nav-btn" onclick="A.calYear++;renderCalendar(document.getElementById('page-container'))">›</div></div>
<div class="cal-year-wrap"><div class="cal-year-grid" id="cal-year-grid"></div></div>
<div class="cal-legend">少 ${CALENDAR_COLORS.map(c=>`<div class="cal-legend-cell" style="background:${c}"></div>`).join('')} 多</div>`;
const grid=document.getElementById('cal-year-grid');
const start=new Date(y,0,1);
const startDay=start.getDay();
let cells='';
for(let i=0;i<startDay;i++)cells+=`<div class="cal-year-cell" style="background:${CALENDAR_COLORS[0]}"></div>`;
const end=new Date(y,11,31);
const totalDays=Math.ceil((end-start)/(1000*60*60*24))+1;
for(let d=0;d<totalDays;d++){
const date=new Date(y,0,d+1);
const dateStr=date.toISOString().slice(0,10);
const entry=cal[dateStr];
let bg=CALENDAR_COLORS[0];
if(entry){const score=entry.fortune||(entry.mood?entry.mood*20:0);bg=CALENDAR_COLORS[Math.min(5,Math.max(1,Math.ceil(score/20)))];}
if(date>today)bg='transparent';
cells+=`<div class="cal-year-cell" style="background:${bg}" title="${dateStr}"></div>`;
}
grid.innerHTML=cells;
}

html+=`<button class="xc-onboard-btn" onclick="nextOnboard()">继续</button>`;
}
html+=`<div class="xc-onboard-dots">${steps.map((_,i)=>`<div class="xc-onboard-dot${i===si?' active':''}"></div>`).join('')}</div>`;
html+=`<div class="xc-onboard-skip" onclick="finishOnboard()">跳过</div>`;

if(s.input){setTimeout(()=>{const inp=ov.querySelector('.xc-onboard-input');if(inp)inp.focus();},300);}
}
window.nextOnboard=()=>{si++;if(si<steps.length)renderStep();else finishOnboard();};

const inp=ov.querySelector('.xc-onboard-input');
if(inp&&inp.value.trim())A.user.name=inp.value.trim();

// ===== SOUL PORTRAIT =====
function calcSoulProfile(){
const h=A.hist;
if(!h.length)return{level:0};
// Merge all dims and scores
const dimMap={};
h.forEach(r=>{
r.dims.forEach((d,i)=>{
if(!dimMap[d])dimMap[d]={sum:0,count:0};
dimMap[d].sum+=r.scores[i];dimMap[d].count++;
});
});
const dims=Object.keys(dimMap);
const scores=dims.map(d=>Math.round(dimMap[d].sum/dimMap[d].count));
// Collect keywords
const kwCount={};
h.forEach(r=>{
const kws=SOUL_KWS[r.persona]||[];
kws.forEach(k=>{kwCount[k]=(kwCount[k]||0)+1;});
});
const keywords=Object.entries(kwCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]);
// Categories covered
const cats=new Set(h.map(r=>r.test.cat));
const allCats=['性格测试','关系匹配','职业测评'];
const completeness=Math.round(cats.size/allCats.length*100);
// Latest persona
const persona=h[0].persona;
const sig=SOUL_SIGS[persona]||'每一个灵魂，都值得被认真对待';
const pIcon=h[0].pIcon;
const level=Math.min(h.length,5);
// Comment based on level
let comment='';
if(h.length===1)comment='刚认识你，再做几个测试我能看得更清楚~';
else if(h.length===2)comment='轮廓越来越清晰了！再来一个会更准哦';
else if(completeness<100)comment=`你的画像越来越丰富了~ 试试${allCats.find(c=>!cats.has(c))||'其他'}类的测试，解锁新维度！`;
else comment='你的灵魂画像已经非常完整了~ 我对你的了解比你自己还多呢';
return{level,persona,pIcon,sig,keywords,dims,scores,completeness,comment,cats,allCats,overall:Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)};
}

function getRecommendTest(){
const doneCats=new Set(A.hist.map(r=>r.test.cat));
const doneIds=new Set(A.hist.map(r=>r.test.id));

if(!rec)rec=T.find(t=>!doneIds.has(t.id));
return rec||T[0];

function renderSwipe(body,q){
body.innerHTML=`
<div class="swipe-zone">

<div class="swipe-stamp stamp-yes" id="stamp-yes">很像我</div>
<div class="swipe-card-emoji">${q.em||'💭'}</div>
<div class="swipe-card-text">${q.t}</div>
</div>
</div>
<div class="swipe-hints">
<div class="swipe-hint no" id="hint-no">← 不太像我</div>
<div class="swipe-hint yes" id="hint-yes">很像我 →</div>
</div>`;
initSwipe();
}

function initSwipe(){
const card=document.getElementById('swipe-card');
if(!card)return;
let startX=0,currentX=0,dragging=false;
const onStart=(x)=>{startX=x;currentX=x;dragging=true;card.style.transition='none';};
const onMove=(x)=>{
if(!dragging)return;
currentX=x;
const dx=currentX-startX;
const rot=dx*0.1;
card.style.transform=`translateX(${dx}px) rotate(${rot}deg)`;
const stampNo=document.getElementById('stamp-no');
const stampYes=document.getElementById('stamp-yes');
const hintNo=document.getElementById('hint-no');
const hintYes=document.getElementById('hint-yes');
if(dx<-30){stampNo.style.opacity='1';hintNo.className='swipe-hint no active-no';}
else{stampNo.style.opacity='0';hintNo.className='swipe-hint no';}
if(dx>30){stampYes.style.opacity='1';hintYes.className='swipe-hint yes active-yes';}
else{stampYes.style.opacity='0';hintYes.className='swipe-hint yes';}
};
const onEnd=()=>{
if(!dragging)return;dragging=false;
const dx=currentX-startX;
card.style.transition='transform 0.4s var(--ease)';
if(Math.abs(dx)>60){
const dir=dx>0?1:0;
card.style.transform=`translateX(${dx>0?400:-400}px) rotate(${dx>0?30:-30}deg)`;
card.style.opacity='0';
flashEdge(dx>0?'mint':'pink');
spawnSparks();
setTimeout(()=>commitAnswer(dx>0?4:1),350);
}else{
card.style.transform='translateX(0) rotate(0)';
}
};
card.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientX);});
document.addEventListener('mousemove',e=>{onMove(e.clientX);});
document.addEventListener('mouseup',onEnd);
card.addEventListener('touchstart',e=>{onStart(e.touches[0].clientX);},{passive:true});
document.addEventListener('touchmove',e=>{onMove(e.touches[0].clientX);},{passive:true});
document.addEventListener('touchend',onEnd);
}

// ---- FORTUNE WHEEL ----
let _fortuneState='ready'; // ready | spinning | stopping
let _fortuneAngle=0;
let _fortuneSpeed=0;
function renderFortune(body,q){
const opts=q.opts||['选项A','选项B','选项C','选项D'];
const ems=q.ems||['🌙','⭐','☀️','🌈'];
const n=opts.length;
const colors=['#9B7ED8','#E8729A','#F2A68B','#7CC5B2','#D4A853','#C9B5F0'];
const segAngle=360/n;
let bg='conic-gradient(';
opts.forEach((o,i)=>{const from=i*segAngle;const to=(i+1)*segAngle;bg+=`${colors[i%6]} ${from}deg ${to}deg`;if(i<n-1)bg+=',';});
bg+=')';
body.innerHTML=`
<div class="fortune-zone">
<div class="fortune-wrap">
<div class="fortune-pointer">📍</div>
<div class="fortune-wheel" id="fortune-wheel" style="background:${bg}">
${opts.map((o,i)=>{
const angle=i*segAngle+segAngle/2-90;
const rad=angle*Math.PI/180;
const r=85;
const x=130+r*Math.cos(rad);
const y=130+r*Math.sin(rad);
return `<div class="fortune-sector-inner" style="left:${x-30}px;top:${y-18}px">${ems[i]}<br>${o}</div>`;
}).join('')}
</div>
<div class="fortune-center" id="fortune-btn" onclick="spinFortune()">转动</div>
</div>
<div class="fortune-result" id="fortune-result"></div>
</div>`;
_fortuneState='ready';_fortuneAngle=0;_fortuneSpeed=0;
}
function spinFortune(){
const btn=document.getElementById('fortune-btn');
const wheel=document.getElementById('fortune-wheel');
if(!wheel)return;
if(_fortuneState==='ready'){
_fortuneState='spinning';
btn.textContent='停！';
_fortuneSpeed=12+Math.random()*8;
wheel.style.transition='none';
const spin=()=>{
if(_fortuneState==='spinning'){
_fortuneAngle+=_fortuneSpeed;
wheel.style.transform=`rotate(${_fortuneAngle}deg)`;
requestAnimationFrame(spin);
}else if(_fortuneState==='stopping'){
_fortuneSpeed*=0.96;
_fortuneAngle+=_fortuneSpeed;
wheel.style.transform=`rotate(${_fortuneAngle}deg)`;
if(_fortuneSpeed>0.3){requestAnimationFrame(spin);}
else{_fortuneState='done';btn.textContent='✨';fortuneResult();}
}
};
requestAnimationFrame(spin);
}else if(_fortuneState==='spinning'){
_fortuneState='stopping';
}
}
function fortuneResult(){
const q=A.test.qs[A.qi];
const opts=q.opts||['A','B','C','D'];
const n=opts.length;
const segAngle=360/n;
const normalAngle=(360-(_fortuneAngle%360))%360;
const idx=Math.floor(normalAngle/segAngle)%n;
const ems=q.ems||['🌙','⭐','☀️','🌈'];
document.getElementById('fortune-result').innerHTML=`${ems[idx]} ${opts[idx]}`;
flashEdge('purple');spawnSparks();
setTimeout(()=>commitAnswer(idx),1200);
}

// ===== NEW INTERACTION: SCRATCH CARD =====
function renderScratch(body,q){
const opts=q.opts||['答案A','答案B','答案C'];
const ems=q.ems||['🦋','🏠','⚔️'];
const pick=Math.floor(Math.random()*opts.length);
body.innerHTML=`<div class="scratch-zone">
<div class="scratch-card" id="scratch-card-wrap"><div class="scratch-reveal"><div class="scratch-reveal-emoji">${ems[pick]}</div><div class="scratch-reveal-text">${opts[pick]}</div></div></div>
<div class="scratch-hint" id="scratch-hint">👆 用手指刮开涂层</div>
<div class="scratch-progress" id="scratch-pct">已刮开 0%</div></div>`;
setTimeout(()=>{
const wrap=document.getElementById('scratch-card-wrap');if(!wrap)return;
const CW=260,CH=180;
const cvs=document.createElement('canvas');
cvs.width=CW;cvs.height=CH;
cvs.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:2;touch-action:none;cursor:crosshair;border-radius:inherit';
wrap.appendChild(cvs);
const ctx=cvs.getContext('2d',{willReadFrequently:true});
const grd=ctx.createLinearGradient(0,0,CW,CH);
grd.addColorStop(0,'#b8a9d4');grd.addColorStop(0.5,'#d4c5e8');grd.addColorStop(1,'#c9b5f0');
ctx.fillStyle=grd;ctx.fillRect(0,0,CW,CH);
ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
ctx.fillText('✨ 刮一刮看看你的答案 ✨',CW/2,CH/2+5);
let drawing=false,committed=false,strokes=0;
function getPos(e){
const r=cvs.getBoundingClientRect();
const t=e.touches?e.touches[0]:e;
return{x:(t.clientX-r.left)/r.width*CW,y:(t.clientY-r.top)/r.height*CH};
}
function doScratch(e){
e.preventDefault();if(!drawing||committed)return;
const p=getPos(e);
ctx.globalCompositeOperation='destination-out';
ctx.beginPath();ctx.arc(p.x,p.y,26,0,Math.PI*2);ctx.fill();
strokes++;
if(strokes%5===0)updatePct();
}
function updatePct(){
const img=ctx.getImageData(0,0,CW,CH).data;
let total=0,cleared=0;
for(let i=3;i<img.length;i+=40){total++;if(img[i]<10)cleared++;}
const pct=Math.round(cleared/total*100);
const el=document.getElementById('scratch-pct');if(el)el.textContent='已刮开 '+pct+'%';
}
function tryCommit(){
if(committed)return;
const img=ctx.getImageData(0,0,CW,CH).data;
let total=0,cleared=0;
for(let i=3;i<img.length;i+=40){total++;if(img[i]<10)cleared++;}
const pct=Math.round(cleared/total*100);
const el=document.getElementById('scratch-pct');if(el)el.textContent='已刮开 '+pct+'%';
if(pct>=35){committed=true;ctx.clearRect(0,0,CW,CH);cvs.style.pointerEvents='none';SoundMgr.play('ding');commitAnswer(pick);}
}
cvs.addEventListener('mousedown',e=>{drawing=true;doScratch(e);});
cvs.addEventListener('mousemove',doScratch);
cvs.addEventListener('mouseup',()=>{drawing=false;tryCommit();});
cvs.addEventListener('touchstart',e=>{drawing=true;doScratch(e);},{passive:false});
cvs.addEventListener('touchmove',doScratch,{passive:false});
cvs.addEventListener('touchend',()=>{drawing=false;tryCommit();});
},120);
}

let dragEl=null,startY=0,startIdx=0;
const items=()=>[...list.querySelectorAll('.rank-item')];
function updateNums(){items().forEach((el,i)=>{el.querySelector('.rank-num').textContent=i+1;});}
list.addEventListener('touchstart',e=>{
const item=e.target.closest('.rank-item');if(!item)return;
dragEl=item;startY=e.touches[0].clientY;startIdx=[...list.children].indexOf(item);
item.classList.add('dragging');
},{passive:true});
list.addEventListener('touchmove',e=>{
if(!dragEl)return;e.preventDefault();
const y=e.touches[0].clientY;const dy=y-startY;
dragEl.style.transform=`translateY(${dy}px) scale(1.03)`;
const siblings=items().filter(el=>el!==dragEl);
siblings.forEach(sib=>{
const r=sib.getBoundingClientRect();
if(y>r.top&&y<r.bottom&&sib!==dragEl){
const curIdx=[...list.children].indexOf(dragEl);
const sibIdx=[...list.children].indexOf(sib);
if(curIdx<sibIdx)list.insertBefore(dragEl,sib.nextSibling);
else list.insertBefore(dragEl,sib);
startY=y;startIdx=sibIdx;
}});
},{passive:false});
list.addEventListener('touchend',()=>{
if(!dragEl)return;
dragEl.classList.remove('dragging');dragEl.style.transform='';
dragEl=null;updateNums();
});
document.getElementById('rank-btn').addEventListener('click',()=>{
const finalOrder=items().map(el=>parseInt(el.dataset.idx));
const val=finalOrder.reduce((acc,v,i)=>acc+v*(i+1),0);
commitAnswer(val);
});
},60);
}

function renderColorPick(body,q){
const colorLabels=q.labels||{0:'热情',60:'活力',120:'平静',180:'忧郁',240:'神秘',300:'浪漫'};
const labelKeys=Object.keys(colorLabels).map(Number).sort((a,b)=>a-b);
body.innerHTML=`<div class="cpick-zone">
<div class="cpick-wheel" id="cpick-wheel"><div class="cpick-pointer" id="cpick-ptr"></div></div>
<div class="cpick-selected" id="cpick-swatch" style="background:var(--bg2)"></div>
<div class="cpick-label" id="cpick-lbl">&nbsp;</div>
<button class="cpick-confirm" id="cpick-btn">确认颜色</button></div>`;
setTimeout(()=>{
const wheel=document.getElementById('cpick-wheel');if(!wheel)return;
const ptr=document.getElementById('cpick-ptr');
const swatch=document.getElementById('cpick-swatch');
const lbl=document.getElementById('cpick-lbl');
const btn=document.getElementById('cpick-btn');
let hue=-1;
function pickColor(e){
e.preventDefault();
const r=wheel.getBoundingClientRect();
const t=e.touches?e.touches[0]:e;
const cx=r.left+r.width/2,cy=r.top+r.height/2;
const dx=t.clientX-cx,dy=t.clientY-cy;
const angle=((Math.atan2(dy,dx)*180/Math.PI)+360)%360;
hue=angle;
const dist=Math.min(r.width/2,Math.sqrt(dx*dx+dy*dy));
const px=r.width/2+dist*Math.cos(angle*Math.PI/180);
const py=r.height/2+dist*Math.sin(angle*Math.PI/180);
ptr.style.left=px+'px';ptr.style.top=py+'px';ptr.classList.add('visible');
ptr.style.background=`hsl(${hue},70%,55%)`;
swatch.style.background=`hsl(${hue},70%,55%)`;
let closest=labelKeys[0],minDiff=360;
labelKeys.forEach(k=>{const diff=Math.min(Math.abs(hue-k),360-Math.abs(hue-k));if(diff<minDiff){minDiff=diff;closest=k;}});
lbl.textContent=colorLabels[closest];lbl.style.color=`hsl(${hue},50%,40%)`;
btn.classList.add('active');
}
wheel.addEventListener('mousedown',pickColor);wheel.addEventListener('mousemove',e=>{if(e.buttons)pickColor(e);});
wheel.addEventListener('touchstart',pickColor,{passive:false});wheel.addEventListener('touchmove',pickColor,{passive:false});
btn.addEventListener('click',()=>{if(hue<0)return;
let closest=labelKeys[0],minDiff=360;
labelKeys.forEach(k=>{const diff=Math.min(Math.abs(hue-k),360-Math.abs(hue-k));if(diff<minDiff){minDiff=diff;closest=k;}});
const val=labelKeys.indexOf(closest)+1;commitAnswer(val);});
},60);
}

'宜人性':s>75?'你富有同理心，善解人意，总是愿意为他人着想。':'你在合作与坚持自我之间保持适当平衡。',

function getMetaphor(category,dims,scores){
const pool=METAPHORS[category]||METAPHORS.building;
// Find best match by top 2 dims
const sorted=dims.map((d,i)=>({d,s:scores[i]})).sort((a,b)=>b.s-a.s);
const top2=[sorted[0].d,sorted[1].d];
let best=pool.find(m=>top2.some(d=>m.dims.includes(d)));
if(!best)best=pool[Math.floor(Math.random()*pool.length)];
return best;
}

function animatePercentiles(){

const circumference=Math.PI*60;

arc.style.transition='stroke-dashoffset 1.2s var(--ease)';
arc.style.strokeDashoffset=offset;
});
document.querySelectorAll('.pct-ring-val[data-count]').forEach(el=>{
const target=parseInt(el.dataset.count);

const step=()=>{
current+=Math.ceil(target/30);

el.textContent=current+'%';
requestAnimationFrame(step);

step();
});
